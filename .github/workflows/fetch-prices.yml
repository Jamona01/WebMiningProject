name: Fetch stock prices

on:
  schedule:
    - cron: "30 9 * * 1-5"   # Mon–Fri 09:30 UTC
    - cron: "0 13 * * 1-5"   # Mon–Fri 13:00 UTC
    - cron: "0 17 * * 1-5"   # Mon–Fri 17:00 UTC
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run on"
        required: false
        default: "feature/stocks-crawling"
      tickers:
        description: "Space-separated ticker symbols (leave empty to use configs/tickers.yml)"
        required: false
        default: ""
      event_time:
        description: "Event datetime ISO-8601 (e.g. 2024-06-10T14:30:00) — triggers event mode"
        required: false
        default: ""
      window:
        description: "Hours before/after event time (default: 4)"
        required: false
        default: "4"
      interval:
        description: "Bar size for event mode (default: 5m)"
        required: false
        default: "5m"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch stock prices
        env:
          TICKERS: ${{ inputs.tickers }}
          EVENT_TIME: ${{ inputs.event_time }}
          WINDOW: ${{ inputs.window }}
          INTERVAL: ${{ inputs.interval }}
        run: |
          ARGS="--once"
          if [ -n "$TICKERS" ]; then
            ARGS="$ARGS --tickers $TICKERS"
          fi
          if [ -n "$EVENT_TIME" ]; then
            ARGS="$ARGS --event-time $EVENT_TIME --window $WINDOW --interval $INTERVAL"
          fi
          python -m src.finance.scheduler $ARGS

      - name: Commit and push price data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/prices/
          git diff --cached --quiet || git commit -m "chore: fetch stock prices [$(date -u +%Y-%m-%dT%H:%M)]"
          git push
